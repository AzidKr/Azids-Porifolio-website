<!DOCTYPE html>
<html>
<head>
<title>Amiin FX Bootcamp</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
padding:100px 20px;
}

h1{
font-size:45px;
}

.blue{
color:#3b82f6;
}

.card{
background:#111;
padding:40px;
border-radius:15px;
max-width:500px;
margin:auto;
margin-top:40px;
}

input{
width:90%;
padding:15px;
margin-top:20px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
margin-top:20px;
padding:15px 40px;
border-radius:30px;
border:none;
background:linear-gradient(90deg,#3b82f6,#2563eb);
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<h1>Join the <span class="blue">Amiin FX Bootcamp</span></h1>

<p>
Limited spots available for serious traders.
Enter your email below to join the waitlist.
</p>

<div class="card">

<input type="email" id="email" placeholder="Enter your email">

<br>

<button onclick="joinWaitlist()">Join Bootcamp Waitlist</button>

</div>

<script>

function joinWaitlist(){

var email = document.getElementById("email").value;

if(email === ""){
alert("Please enter your email first.");
return;
}

alert("Your email has been sent to Amiin FX. Please wait for a response.");

document.getElementById("email").value = "";

}

</script>
<p>Built by Azid Web Development.<br>Contact: ahmed12kr@icloud.com
</p>
</body>
</html>
